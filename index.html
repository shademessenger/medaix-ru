<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>medaix ru</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #667085;
      --line: #dde3ea;
      --accent: #0d7c66;
      --accent-dark: #095f4e;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 400px;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px;
      height: 100vh;
      overflow: hidden;
    }
    header {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 4px 2px;
    }
    h1 { font-size: 24px; margin: 0; letter-spacing: 0; }
    .status { color: var(--muted); font-size: 14px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-width: 0;
    }
    .chat {
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 0;
      overflow: hidden;
    }
    .messages {
      padding: 18px;
      overflow: auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 78%;
      padding: 11px 13px;
      border-radius: 8px;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .user { align-self: flex-end; background: var(--accent); color: white; }
    .bot { align-self: flex-start; background: #eef1f5; color: var(--text); }
    .sources {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(0,0,0,.08);
      color: var(--muted);
      font-size: 12px;
    }
    form { margin: 0; }
    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid var(--line);
    }
    textarea, input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px 11px;
      font: inherit;
      background: white;
      color: var(--text);
    }
    textarea { min-height: 86px; resize: vertical; }
    button {
      border: 0;
      border-radius: 7px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
      background: var(--accent);
      color: white;
      white-space: nowrap;
    }
    button:hover { background: var(--accent-dark); }
    button.danger { background: #fee4e2; color: var(--danger); }
    aside {
      padding: 16px;
      min-height: 0;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr);
    }
    h2 { font-size: 18px; margin: 0 0 12px; }
    .train-grid { display: grid; gap: 10px; }
    .hint { color: var(--muted); font-size: 13px; line-height: 1.4; }
    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-top: 18px;
    }
    .knowledge {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      max-height: 360px;
      min-height: 0;
      overflow: auto;
    }
    .item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      display: grid;
      gap: 6px;
    }
    .item-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .item-text { font-size: 14px; line-height: 1.35; overflow-wrap: anywhere; }
    @media (max-width: 880px) {
      .app { grid-template-columns: 1fr; padding: 12px; }
      header { align-items: flex-start; flex-direction: column; }
      body { overflow: auto; }
      .app { height: auto; min-height: 100vh; overflow: visible; }
      .chat { height: 58vh; }
      .msg { max-width: 92%; }
      .composer, .search-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>medaix ru</h1>
      <div class="status" id="status">&#1043;&#1086;&#1090;&#1086;&#1074; &#1082; &#1086;&#1073;&#1091;&#1095;&#1077;&#1085;&#1080;&#1102;</div>
    </header>

    <section class="panel chat" aria-label="chat">
      <div class="messages" id="messages"></div>
      <form class="composer" id="chatForm">
        <input id="message" autocomplete="off" placeholder="&#1053;&#1072;&#1087;&#1080;&#1096;&#1080;&#1090;&#1077; &#1074;&#1086;&#1087;&#1088;&#1086;&#1089;..." required>
        <button type="submit">&#1054;&#1090;&#1087;&#1088;&#1072;&#1074;&#1080;&#1090;&#1100;</button>
      </form>
    </section>

    <aside class="panel">
      <h2>&#1054;&#1073;&#1091;&#1095;&#1077;&#1085;&#1080;&#1077;</h2>
      <form class="train-grid" id="trainForm">
        <select id="kind">
          <option value="fact">&#1060;&#1072;&#1082;&#1090;</option>
          <option value="qa">&#1042;&#1086;&#1087;&#1088;&#1086;&#1089;-&#1086;&#1090;&#1074;&#1077;&#1090;</option>
          <option value="term">&#1058;&#1077;&#1088;&#1084;&#1080;&#1085;</option>
        </select>
        <input id="question" placeholder="&#1042;&#1086;&#1087;&#1088;&#1086;&#1089;, &#1090;&#1077;&#1088;&#1084;&#1080;&#1085; &#1080;&#1083;&#1080; &#1082;&#1083;&#1102;&#1095;&#1077;&#1074;&#1099;&#1077; &#1089;&#1083;&#1086;&#1074;&#1072;">
        <textarea id="answer" placeholder="&#1060;&#1072;&#1082;&#1090; &#1080;&#1083;&#1080; &#1086;&#1090;&#1074;&#1077;&#1090;, &#1082;&#1086;&#1090;&#1086;&#1088;&#1099;&#1081; AI &#1076;&#1086;&#1083;&#1078;&#1077;&#1085; &#1079;&#1072;&#1087;&#1086;&#1084;&#1085;&#1080;&#1090;&#1100;" required></textarea>
        <button type="submit">&#1057;&#1086;&#1093;&#1088;&#1072;&#1085;&#1080;&#1090;&#1100;</button>
        <div class="hint">&#1047;&#1072;&#1087;&#1080;&#1089;&#1080; &#1089;&#1086;&#1093;&#1088;&#1072;&#1085;&#1103;&#1102;&#1090;&#1089;&#1103; &#1085;&#1072; &#1089;&#1077;&#1088;&#1074;&#1077;&#1088;&#1077; &#1080; &#1080;&#1089;&#1087;&#1086;&#1083;&#1100;&#1079;&#1091;&#1102;&#1090;&#1089;&#1103; &#1074; &#1089;&#1083;&#1077;&#1076;&#1091;&#1102;&#1097;&#1080;&#1093; &#1086;&#1090;&#1074;&#1077;&#1090;&#1072;&#1093;.</div>
      </form>

      <div class="search-row">
        <input id="knowledgeSearch" placeholder="&#1055;&#1086;&#1080;&#1089;&#1082; &#1087;&#1086; &#1079;&#1072;&#1087;&#1080;&#1089;&#1103;&#1084;: #12, &#1080;&#1085;&#1089;&#1091;&#1083;&#1100;&#1090;, &#1072;&#1085;&#1090;&#1080;&#1073;&#1080;&#1086;&#1090;&#1080;&#1082;">
        <button type="button" id="searchButton">&#1053;&#1072;&#1081;&#1090;&#1080;</button>
      </div>
      <div class="knowledge" id="knowledge"></div>
    </aside>
  </main>

  <script>
    const t = {
      ready: "\u0413\u043e\u0442\u043e\u0432 \u043a \u043e\u0431\u0443\u0447\u0435\u043d\u0438\u044e",
      thinking: "\u0414\u0443\u043c\u0430\u044e...",
      saving: "\u0421\u043e\u0445\u0440\u0430\u043d\u044f\u044e...",
      saved: "\u0417\u0430\u043f\u0438\u0441\u044c \u0441\u043e\u0445\u0440\u0430\u043d\u0435\u043d\u0430",
      deleted: "\u0417\u0430\u043f\u0438\u0441\u044c \u0443\u0434\u0430\u043b\u0435\u043d\u0430",
      error: "\u041e\u0448\u0438\u0431\u043a\u0430",
      used: "\u0418\u0441\u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u043d\u043e \u0437\u0430\u043f\u0438\u0441\u0435\u0439: ",
      fact: "\u0444\u0430\u043a\u0442",
      qa: "\u0432\u043e\u043f\u0440\u043e\u0441-\u043e\u0442\u0432\u0435\u0442",
      term: "\u0442\u0435\u0440\u043c\u0438\u043d",
      del: "\u0423\u0434\u0430\u043b\u0438\u0442\u044c",
      edit: "\u0420\u0435\u0434\u0430\u043a\u0442.",
      cancel: "\u041e\u0442\u043c\u0435\u043d\u0430",
      save: "\u0421\u043e\u0445\u0440\u0430\u043d\u0438\u0442\u044c",
      q: "\u0412:",
      empty: "\u041d\u0438\u0447\u0435\u0433\u043e \u043d\u0435 \u043d\u0430\u0439\u0434\u0435\u043d\u043e",
      hello: "\u041f\u0440\u0438\u0432\u0435\u0442. \u042f \u0443\u043c\u0435\u044e \u0443\u0447\u0438\u0442\u044c\u0441\u044f: \u0434\u043e\u0431\u0430\u0432\u044c\u0442\u0435 \u0444\u0430\u043a\u0442, \u0442\u0435\u0440\u043c\u0438\u043d \u0438\u043b\u0438 \u0432\u043e\u043f\u0440\u043e\u0441-\u043e\u0442\u0432\u0435\u0442 \u0441\u043f\u0440\u0430\u0432\u0430, \u0430 \u043f\u043e\u0438\u0441\u043a \u043f\u043e \u0431\u0430\u0437\u0435 \u043d\u0438\u0436\u0435.",
      loadFail: "\u041d\u0435 \u0443\u0434\u0430\u043b\u043e\u0441\u044c \u0437\u0430\u0433\u0440\u0443\u0437\u0438\u0442\u044c \u0431\u0430\u0437\u0443"
    };
    const messages = document.querySelector("#messages");
    const statusEl = document.querySelector("#status");
    const knowledgeEl = document.querySelector("#knowledge");
    const chatForm = document.querySelector("#chatForm");
    const trainForm = document.querySelector("#trainForm");
    const searchEl = document.querySelector("#knowledgeSearch");
    const searchButton = document.querySelector("#searchButton");
    const kindEl = document.querySelector("#kind");
    const questionEl = document.querySelector("#question");
    const answerEl = document.querySelector("#answer");

    function setStatus(text) { statusEl.textContent = text; }

    function addMessage(text, cls, matches = []) {
      const node = document.createElement("div");
      node.className = `msg ${cls}`;
      node.textContent = text;
      if (matches.length) {
        const sources = document.createElement("div");
        sources.className = "sources";
        sources.textContent = t.used + matches.map(m => "#" + m.id).join(", ");
        node.appendChild(sources);
      }
      messages.appendChild(node);
      messages.scrollTop = messages.scrollHeight;
    }

    async function api(path, payload) {
      const res = await fetch(path, {
        method: payload ? "POST" : "GET",
        headers: payload ? { "Content-Type": "application/json; charset=utf-8" } : {},
        body: payload ? JSON.stringify(payload) : undefined
      });
      const raw = await res.text();
      console.log("[api] status", res.status, path);
      console.log("[api] raw body", raw);

      let data = null;
      try {
        data = raw ? JSON.parse(raw) : {};
      } catch (error) {
        throw new Error(
          "API returned non-JSON response (" + res.status + "): " + raw.slice(0, 180)
        );
      }

      if (!res.ok) {
        throw new Error((data && data.error) || t.error);
      }
      return data;
    }

    async function refreshKnowledge() {
      const q = searchEl.value.trim();
      const path = q ? "/ai/api/knowledge?q=" + encodeURIComponent(q) : "/ai/api/knowledge";
      const data = await api(path);
      knowledgeEl.innerHTML = "";
      if (!data.items.length) {
        const empty = document.createElement("div");
        empty.className = "hint";
        empty.textContent = t.empty;
        knowledgeEl.appendChild(empty);
        return;
      }
      data.items.forEach(item => {
        const row = document.createElement("div");
        row.className = "item";
        const label = item.kind === "qa" ? t.qa : item.kind === "term" ? t.term : t.fact;
        row.innerHTML = `
          <div class="item-head">
            <span>#${item.id} ${label}</span>
            <span>
              <button type="button" data-edit="${item.id}">${t.edit}</button>
              <button class="danger" type="button" data-id="${item.id}">${t.del}</button>
            </span>
          </div>
          ${item.question ? `<div class="item-text"><strong>${t.q}</strong> ${escapeHtml(item.question)}</div>` : ""}
          <div class="item-text">${escapeHtml(item.answer)}</div>
        `;
        row.dataset.item = JSON.stringify(item);
        knowledgeEl.appendChild(row);
      });
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[ch]));
    }

    chatForm.addEventListener("submit", async event => {
      event.preventDefault();
      const input = document.querySelector("#message");
      const message = input.value.trim();
      if (!message) return;
      input.value = "";
      addMessage(message, "user");
      setStatus(t.thinking);
      try {
        const data = await api("/ai/api/chat", { message });
        addMessage(data.answer, "bot", data.matches || []);
        setStatus(t.ready);
      } catch (error) {
        addMessage(error.message, "bot");
        setStatus(t.error);
      }
    });

    trainForm.addEventListener("submit", async event => {
      event.preventDefault();
      setStatus(t.saving);
      try {
        await api("/ai/api/train", {
          kind: kindEl.value,
          question: questionEl.value,
          answer: answerEl.value
        });
        questionEl.value = "";
        answerEl.value = "";
        await refreshKnowledge();
        setStatus(t.saved);
      } catch (error) {
        setStatus(error.message);
      }
    });

    searchButton.addEventListener("click", refreshKnowledge);
    searchEl.addEventListener("input", () => {
      clearTimeout(searchEl._timer);
      searchEl._timer = setTimeout(refreshKnowledge, 250);
    });

    knowledgeEl.addEventListener("click", async event => {
      const editBtn = event.target.closest("button[data-edit]");
      if (editBtn) {
        const row = editBtn.closest(".item");
        const item = JSON.parse(row.dataset.item);
        row.innerHTML = `
          <div class="item-head"><span>#${item.id}</span></div>
          <select data-field="kind">
            <option value="fact">${t.fact}</option>
            <option value="qa">${t.qa}</option>
            <option value="term">${t.term}</option>
          </select>
          <input data-field="question" value="${escapeAttr(item.question || "")}">
          <textarea data-field="answer">${escapeHtml(item.answer || "")}</textarea>
          <div class="search-row">
            <button type="button" data-save-edit="${item.id}">${t.save}</button>
            <button type="button" data-cancel-edit>${t.cancel}</button>
          </div>
        `;
        row.querySelector('[data-field="kind"]').value = item.kind;
        return;
      }

      const saveBtn = event.target.closest("button[data-save-edit]");
      if (saveBtn) {
        const row = saveBtn.closest(".item");
        await api("/ai/api/update", {
          id: saveBtn.dataset.saveEdit,
          kind: row.querySelector('[data-field="kind"]').value,
          question: row.querySelector('[data-field="question"]').value,
          answer: row.querySelector('[data-field="answer"]').value
        });
        await refreshKnowledge();
        setStatus(t.saved);
        return;
      }

      if (event.target.closest("button[data-cancel-edit]")) {
        await refreshKnowledge();
        return;
      }

      const btn = event.target.closest("button[data-id]");
      if (!btn) return;
      await api("/ai/api/delete", { id: btn.dataset.id });
      await refreshKnowledge();
      setStatus(t.deleted);
    });

    function escapeAttr(text) {
      return escapeHtml(text).replace(/`/g, "&#096;");
    }

    addMessage(t.hello, "bot");
    refreshKnowledge().catch(() => setStatus(t.loadFail));
  </script>
</body>
</html>
